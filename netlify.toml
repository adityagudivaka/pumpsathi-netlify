# PumpSathi on Netlify — static SPA + serverless API + Blobs storage
[build]
  publish = "public"
  functions = "netlify/functions"
  command = "echo 'no build step'"

[functions]
  node_bundler = "esbuild"

# API → the Express serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Always revalidate the SPA assets so a new deploy shows immediately (no stale cache)
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
